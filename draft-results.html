<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c12;--surface:#13161f;--card:#1a1d2b;
  --border:#252840;--text:#e8eaf0;--muted:#6b7194;--radius:12px;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding:32px 20px 60px;
}
h1{
  font-size:1.5rem;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;color:#fff;margin-bottom:6px;
}
.subtitle{
  font-size:.8rem;color:var(--muted);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:0;
}
.teams-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:24px;max-width:1400px;margin:0 auto;
}
.team-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.team-header{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-bottom:1px solid var(--border);
}
.team-number{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:800;flex-shrink:0;
}
.team-name{font-size:1rem;font-weight:700;line-height:1.2}
.team-pick-count{margin-left:auto;font-size:.72rem;color:var(--muted);white-space:nowrap}
.player-list{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.player-tile{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 6px;border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);position:relative;
}
.player-tile:nth-child(4n){border-right:none}
.pick-badge{
  position:absolute;top:5px;left:5px;
  font-size:.58rem;font-weight:800;color:var(--muted);line-height:1;
}
.player-photo{
  width:76px;height:76px;border-radius:50%;
  object-fit:cover;object-position:center top;
  background:var(--border);display:block;margin-bottom:6px;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
}
.player-photo:hover{transform:scale(1.08);box-shadow:0 0 0 2px #fff4}
.player-photo-placeholder{
  width:76px;height:76px;border-radius:50%;
  background:var(--border);display:flex;align-items:center;
  justify-content:center;font-size:1.6rem;margin-bottom:6px;flex-shrink:0;
}
.player-id{font-size:.6rem;color:var(--muted);font-weight:700;letter-spacing:.04em;line-height:1;margin-bottom:2px}
.player-name{font-size:.68rem;font-weight:600;text-align:center;line-height:1.25;color:var(--text);word-break:break-word}
/* lightbox */
#lightbox{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.88);
  align-items:center;justify-content:center;cursor:pointer;
}
#lightbox.open{display:flex}
#lightbox img{
  max-width:88vw;max-height:88vh;
  border-radius:12px;object-fit:contain;
  box-shadow:0 8px 48px rgba(0,0,0,0.7);
}
#lightbox-name{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.7);color:#fff;
  padding:8px 20px;border-radius:20px;
  font-size:.9rem;font-weight:600;pointer-events:none;white-space:nowrap;
}
.loading-msg{
  text-align:center;color:var(--muted);padding:60px 20px;font-size:.95rem;
}

/* ── Header + hamburger menu (matches index.html / rotations.html) ── */
.top-header{
  max-width:1400px;margin:0 auto 28px;padding:0 4px;
  display:flex;align-items:center;gap:14px;
}
.btn-menu-toggle{
  flex-shrink:0;width:36px;height:36px;background:transparent;
  border:1px solid var(--border);border-radius:8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;transition:border-color .15s;
}
.btn-menu-toggle:hover{border-color:#4f8ef7}
.btn-menu-toggle span{
  display:block;width:18px;height:2px;background:var(--text);
  border-radius:2px;transition:transform .2s,opacity .2s;
}
.btn-menu-toggle[aria-expanded="true"] span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.btn-menu-toggle[aria-expanded="true"] span:nth-child(2){opacity:0}
.btn-menu-toggle[aria-expanded="true"] span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

.top-header-titles{min-width:0;flex:1 1 auto}
.top-header-titles h1{
  font-size:1.4rem;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

@media (max-width:640px){
  .top-header-titles h1{font-size:1rem}
}

.side-menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300}
.side-menu-overlay.hidden{display:none}
.side-menu{
  position:fixed;top:0;left:0;height:100%;width:260px;max-width:80vw;
  background:var(--surface);border-right:1px solid var(--border);
  box-shadow:0 4px 24px rgba(0,0,0,.4);z-index:301;
  display:flex;flex-direction:column;transform:translateX(-100%);
  transition:transform .2s ease;
}
.side-menu.open{transform:translateX(0)}
.side-menu-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid var(--border);
  font-weight:700;color:var(--text);
}
.btn-menu-close{
  background:transparent;border:none;color:var(--muted);
  font-size:1.1rem;cursor:pointer;padding:4px 8px;
}
.btn-menu-close:hover{color:var(--text)}
.side-menu-link{
  display:flex;align-items:center;gap:10px;padding:14px 18px;
  color:var(--text);text-decoration:none;font-size:.95rem;
  border-bottom:1px solid var(--border);
}
.side-menu-link:hover{background:var(--card)}
.side-menu-link.active{color:#4f8ef7;font-weight:600}
</style>

// Map player ID -> Drive file IDs (populated after API call)
const photoIndex = {};  // id -> { thumbUrl, fullUrl }

async function buildPhotoIndex() {
  const cached = sessionStorage.getItem('drivePhotos');
  if (cached) {
    Object.assign(photoIndex, JSON.parse(cached));
    return;
  }
  const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`'${PHOTOS_FOLDER_ID}' in parents`)}&fields=files(id,name)&key=${DRIVE_API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) return;
  const data = await res.json();
  (data.files || []).forEach(({ id, name }) => {
    const pid = name.replace(/\.[^/.]+$/, '').trim();
    photoIndex[pid] = {
      thumbUrl: `https://drive.google.com/thumbnail?id=${id}&sz=w400`,
      fullUrl:  `https://drive.google.com/thumbnail?id=${id}&sz=w1200`,
    };
  });
  sessionStorage.setItem('drivePhotos', JSON.stringify(photoIndex));
}

function renderTeam(t) {
  const tiles = t.players.map(p => {
    const entry = photoIndex[p.id];
    const photoHtml = entry
      ? `<img class="player-photo"
              src="${entry.thumbUrl}"
              alt="${p.name}"
              onclick="openLightbox('${entry.fullUrl}','${p.name.replace(/'/g, "\\'")}',event)"
              onerror="this.outerHTML='<div class=\\'player-photo-placeholder\\'>🏀</div>'" />`
      : `<div class="player-photo-placeholder">🏀</div>`;
    return `
      <div class="player-tile">
        <span class="pick-badge">#${p.pick}</span>
        ${photoHtml}
        <div class="player-id">${p.id}</div>
        <div class="player-name">${p.name}</div>
      </div>`;
  }).join('');

  return `
    <div class="team-card">
      <div class="team-header">
        <div class="team-number" style="background:${t.color}20;color:${t.color};border:1.5px solid ${t.color}40">${t.num}</div>
        <div class="team-name">${t.coach}</div>
        <div class="team-pick-count">${t.players.length} players</div>
      </div>
      <div class="player-list">${tiles}</div>
    </div>`;
}

async function init() {
  await buildPhotoIndex();
  document.getElementById('teams-grid').innerHTML = TEAMS.map(renderTeam).join('');
}

function openLightbox(src, name, e) {
  e.stopPropagation();
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-name').textContent = name;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
});

init();
