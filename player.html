<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Profile</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CSBC Draft" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="back-link">← Back to Directory</a>
      <div class="header-controls">
        <div id="coach-badge" class="coach-badge hidden">
          <span id="coach-badge-name"></span>
          <button id="btn-logout" class="btn-sm">Log Out</button>
        </div>
        <button id="btn-login" class="btn-primary">Coach Login</button>
      </div>
    </div>
  </header>

  <main id="player-main" class="player-profile">
    <div class="loading">Loading player…</div>
  </main>

  <!-- Composite Rank Breakdown Modal -->
  <div id="modal-rankings" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Ranking Breakdown</h2>
      <p id="rank-composite-display" class="rank-composite-display"></p>
      <table id="rank-table" class="rank-table">
        <thead>
          <tr><th>Coach</th><th>Ranking</th></tr>
        </thead>
        <tbody id="rank-table-body"></tbody>
      </table>
      <div id="rank-footer" class="rank-footer"></div>
      <div class="modal-actions">
        <button id="btn-rankings-close" class="btn-primary">Close</button>
      </div>
    </div>
  </div>

  <!-- Coach Login Modal -->
  <div id="modal-login" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Coach Login</h2>
      <label>Select your name
        <select id="login-name">
          <option value="">— choose —</option>
        </select>
      </label>
      <label>PIN
        <input id="login-pin" type="password" maxlength="6" placeholder="Enter your PIN" />
      </label>
      <p id="login-error" class="error-msg hidden">Incorrect PIN. Try again.</p>
      <div class="modal-actions">
        <button id="btn-login-cancel" class="btn-secondary">Cancel</button>
        <button id="btn-login-submit" class="btn-primary">Log In</button>
      </div>
    </div>
  </div>

  <script type="module" src="player.js"></script>
  <script type="module" src="coach-login.js"></script>
</body>
</html>
