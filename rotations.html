<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotations — CSBC 2026 SJV Summer Directory</title>
  <meta property="og:title" content="Rotations — CSBC 2026 SJV Summer Directory" />
  <meta property="og:description" content="Build and validate quarter-by-quarter game rotations for CSBC SJV Summer 2026 teams." />
  <meta name="description" content="Build and validate quarter-by-quarter game rotations for CSBC SJV Summer 2026 teams." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CSBC Draft" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <button id="btn-menu-toggle" class="btn-menu-toggle" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <h1>Rotations</h1>
      </div>
      <div class="header-controls">
        <a href="index.html" class="back-link">← Directory</a>
      </div>
    </div>
  </header>

  <!-- Side menu -->
  <div id="side-menu-overlay" class="side-menu-overlay hidden"></div>
  <nav id="side-menu" class="side-menu" aria-label="Main menu">
    <div class="side-menu-header">
      <span>Menu</span>
      <button id="btn-menu-close" class="btn-menu-close" aria-label="Close menu">✕</button>
    </div>
    <a href="index.html" class="side-menu-link">🏀 Player Directory</a>
    <a href="rotations.html" class="side-menu-link active">🔄 Rotations</a>
    <a href="draft-results.html" class="side-menu-link">🏆 Draft Results</a>
    <a href="schedule.html" class="side-menu-link">📅 Schedules</a>
  </nav>

  <main>
    <div class="rotations-page">

      <!-- Team selector -->
      <div class="rot-toolbar">
        <label class="rot-team-select-label">
          Team
          <select id="rot-team-select">
            <option value="">— choose a team —</option>
          </select>
        </label>

        <div class="rot-avatar-toggle" role="group" aria-label="Avatar style">
          <span class="bar-label">Cell avatars:</span>
          <button class="avatar-toggle-btn active" data-style="photo">Photo</button>
          <button class="avatar-toggle-btn" data-style="initials">Initials</button>
        </div>
      </div>

      <div id="rot-status-banner" class="rot-status-banner hidden"></div>

      <!-- Grid -->
      <div id="rot-grid-wrap" class="rot-grid-wrap hidden">
        <div id="rot-grid" class="rot-grid"></div>

        <div class="rot-actions">
          <button id="btn-generate" class="btn-primary">🎲 Generate Options</button>
        </div>
      </div>

      <div id="rot-empty-state" class="loading">Select a team to build its rotation.</div>
    </div>
  </main>

  <!-- Player status popover -->
  <div id="rot-popover" class="rot-popover hidden"></div>

  <!-- Quarter header popover -->
  <div id="rot-quarter-popover" class="rot-popover hidden"></div>

  <!-- Generate Options modal -->
  <div id="modal-suggestions" class="modal-overlay hidden">
    <div class="modal-box modal-box-lg">
      <h2>Choose a Rotation</h2>
      <p class="rot-suggestions-hint">10 legal options, generated from the current tile order. Applying one replaces the grid below.</p>
      <div id="suggestions-list" class="suggestions-list"></div>
      <div class="modal-actions">
        <button id="btn-suggestions-close" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="rotations.js"></script>
  <script type="module" src="side-menu.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/draft-tool/sw.js');
  </script>
</body>
</html>
