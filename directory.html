<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSBC 2026 SJV Summer Directory</title>
  <meta property="og:title" content="CSBC 2026 SJV Summer Directory" />
  <meta property="og:description" content="Player directory and rankings for CSBC SJV Summer 2026 draft." />
  <meta name="description" content="Player directory and rankings for CSBC SJV Summer 2026 draft." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CSBC Draft" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <button id="btn-menu-toggle" class="btn-menu-toggle" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <h1>CSBC SJV Player Directory - Summer 2026</h1>
      </div>
      <div class="header-controls">
        <div id="coach-badge" class="coach-badge hidden">
          <span id="coach-badge-name"></span>
          <button id="btn-logout" class="btn-sm">Log Out</button>
        </div>
        <button id="btn-login" class="btn-primary">Coach Login</button>
        <button id="btn-drawer-toggle" class="btn-drawer-toggle" aria-label="Toggle filters">
          <span id="drawer-toggle-icon">▾ Filters</span>
        </button>
      </div>
    </div>

    <!-- Collapsible drawer: sort + search + filters -->
    <div id="header-drawer" class="header-drawer">
      <!-- Sort bar -->
      <div class="sort-bar">
        <span class="bar-label">Sort:</span>
        <button class="sort-btn" data-sort="alpha">A – Z</button>
        <button class="sort-btn active" data-sort="id">ID #</button>
        <button class="sort-btn" data-sort="birthday">Age</button>
        <button class="sort-btn" data-sort="team">Team</button>
        <button class="sort-btn" data-sort="rank">Rank</button>
      </div>

      <!-- Search bar -->
      <div class="search-bar">
        <input id="player-search" type="search" placeholder="Search players…" autocomplete="off" />
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <div class="filter-row">
          <span class="bar-label">Filter:</span>
          <button class="filter-chip filter-fav" id="filter-favorites">♥ Favorites</button>
          <button class="filter-chip filter-noshow hidden" id="filter-noshows">✕ No Shows</button>
          <div id="filter-grades" class="filter-group"></div>
        </div>
        <div class="filter-row">
          <span class="bar-label">Seed:</span>
          <div id="filter-seeds" class="filter-group"></div>
        </div>
        <div class="filter-row">
          <span class="bar-label">Team:</span>
          <div id="filter-teams" class="filter-group"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Side menu -->
  <div id="side-menu-overlay" class="side-menu-overlay hidden"></div>
  <nav id="side-menu" class="side-menu" aria-label="Main menu">
    <div class="side-menu-header">
      <span>Menu</span>
      <button id="btn-menu-close" class="btn-menu-close" aria-label="Close menu">✕</button>
    </div>
    <a href="index.html" class="side-menu-link">📅 Schedules</a>
    <a href="gameboard.html" class="side-menu-link">🎯 Gameboard</a>
    <a href="rotations.html" class="side-menu-link">🔄 Rotations</a>
    <a href="directory.html" class="side-menu-link active">🏀 Player Directory</a>
    <a href="draft-results.html" class="side-menu-link">🏆 Draft Results</a>
  </nav>

  <main>
    <div id="player-grid" class="player-grid">
      <div class="loading">Loading players…</div>
    </div>
  </main>

  <!-- Coach Login Modal -->
  <div id="modal-login" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Coach Login</h2>
      <label>Select your name
        <select id="login-name">
          <option value="">— choose —</option>
        </select>
      </label>
      <label>PIN
        <input id="login-pin" type="password" maxlength="6" placeholder="Enter your PIN" />
      </label>
      <p id="login-error" class="error-msg hidden">Incorrect PIN. Try again.</p>
      <div class="modal-actions">
        <button id="btn-login-cancel" class="btn-secondary">Cancel</button>
        <button id="btn-login-submit" class="btn-primary">Log In</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
  <script type="module" src="coach-login.js"></script>
  <script type="module" src="side-menu.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/draft-tool/sw.js');
  </script>
</body>
</html>
